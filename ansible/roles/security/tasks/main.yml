---
- name: Check UFW status
  become: true
  shell: ufw status
  register: ufw_status
  changed_when: false

- name: Reset UFW to a clean state
  become: true
  ufw:
    state: reset
  when: "'inactive' in ufw_status.stdout or force_reset | default(false)"

- name: Set default UFW policy - deny incoming
  become: true
  ufw:
    direction: incoming
    policy: deny

- name: Set default UFW policy - allow outgoing
  become: true
  ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH from Bastion only
  become: true
  ufw:
    rule: allow
    from_ip: "{{ nodes.bastion }}"
    port: '22'
    proto: tcp

- name: Allow SSH from admin machine (emergency fallback)
  become: true
  ufw:
    rule: allow
    from_ip: "{{ network_config.emergency_ip }}"
    port: '22'
    proto: tcp
    comment: 'Emergency SSH access'

- name: Rate limit SSH connections
  become: true
  ufw:
    rule: limit
    port: '22'
    proto: tcp

- name: Allow all traffic from trusted subnet (ICMP + internal comms)
  become: true
  ufw:
    rule: allow
    from_ip: "{{ network_config.trusted_subnet }}"
    comment: 'Trusted subnet - all traffic'
    
- name: Allow node-exporter from trusted subnet
  become: true
  ufw:
    rule: allow
    from_ip: "{{ network_config.trusted_subnet }}"
    port: '9100'
    proto: tcp
    comment: 'Prometheus node-exporter'

- name: Allow pod network traffic
  become: true
  ufw:
    rule: allow
    from_ip: "{{ pod_cidr }}"
    comment: 'K3s pod network'    

- name: Allow NodePort range from trusted subnet
  become: true
  ufw:
    rule: allow
    from_ip: "{{ network_config.trusted_subnet }}"
    port: '30000:32767'
    proto: tcp

- name: Allow K3s API server from trusted subnet
  become: true
  ufw:
    rule: allow
    from_ip: "{{ network_config.trusted_subnet }}"
    port: '6443'
    proto: tcp

- name: Allow Kubelet API from trusted subnet
  become: true
  ufw:
    rule: allow
    from_ip: "{{ network_config.trusted_subnet }}"
    port: '10250'
    proto: tcp

- name: Allow Calico BGP from trusted subnet
  become: true
  ufw:
    rule: allow
    from_ip: "{{ network_config.trusted_subnet }}"
    port: '179'
    proto: tcp
    comment: 'Calico BGP'

- name: Allow Calico VXLAN from trusted subnet
  become: true
  ufw:
    rule: allow
    from_ip: "{{ network_config.trusted_subnet }}"
    port: '4789'
    proto: udp
    comment: 'Calico VXLAN'

- name: Allow Calico Typha from trusted subnet
  become: true
  ufw:
    rule: allow
    from_ip: "{{ network_config.trusted_subnet }}"
    port: '5473'
    proto: tcp
    comment: 'Calico Typha'

- name: Allow Calico health checks
  become: true
  ufw:
    rule: allow
    from_ip: "{{ network_config.trusted_subnet }}"
    port: '9099'
    proto: tcp
    comment: 'Calico health'

- name: Enable UFW logging
  become: true
  ufw:
    logging: 'on'

- name: Harden SSH daemon configuration
  become: true
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^{{ item.key }}\\s+"
    line: "{{ item.key }} {{ item.value }}"
    create: false
  loop:
    - { key: "PasswordAuthentication", value: "no" }
    - { key: "PermitRootLogin", value: "no" }
  notify: Restart ssh

- name: Enable UFW firewall
  become: true
  ufw:
    state: enabled
    policy: deny
