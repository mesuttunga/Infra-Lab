---
- name: Add Prometheus community Helm repo
  become: true
  shell: helm repo add prometheus-community {{ monitoring.prometheus_stack_repo }}
  environment:
    KUBECONFIG: "{{ k8s_kubeconfig }}"
  changed_when: false

- name: Update Helm repos
  become: true
  shell: helm repo update
  environment:
    KUBECONFIG: "{{ k8s_kubeconfig }}"
  changed_when: false

- name: Template monitoring values
  become: true
  template:
    src: values.yml.j2
    dest: /tmp/monitoring-values.yml
    mode: '0600'

- name: Deploy Kube-Prometheus-Stack via Helm
  become: true
  shell: |
    helm upgrade --install {{ monitoring.release_name }} \
      prometheus-community/{{ monitoring.prometheus_stack_chart }} \
      --namespace {{ monitoring.namespace }} \
      --create-namespace \
      -f /tmp/monitoring-values.yml \
      --wait --timeout 10m
  environment:
    KUBECONFIG: "{{ k8s_kubeconfig }}"
  register: monitoring_install
  changed_when: "'has been upgraded' in monitoring_install.stdout or 'has been deployed' in monitoring_install.stdout"

- name: Wait for monitoring stack to be ready
  become: true
  shell: kubectl wait --for=condition=Ready pods --all -n {{ monitoring.namespace }} --timeout=300s
  environment:
    KUBECONFIG: "{{ k8s_kubeconfig }}"
  changed_when: false
  retries: 3
  delay: 30